<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeeGees - Sign Up</title>

<style>
  * {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    background: linear-gradient(135deg, #1e1e2f, #2a2a40);
    color: #fff;
  }

  .container {
    margin: auto;
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }

  h2 {
    margin-bottom: 10px;
  }

  p {
    margin-top: 0;
    color: #aaa;
    font-size: 14px;
  }

  .form-group {
    margin-top: 15px;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-top: 5px;
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  input::placeholder {
    color: #ccc;
  }

  button {
    width: 100%;
    margin-top: 25px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #6c63ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #5750d6;
  }

  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
  }

  .footer a {
    color: #6c63ff;
    text-decoration: none;
  }

</style>

</head>

<body>

<div class="container">
  <h2>Create Account ✨</h2>
  <p>Sign up to start using DeeGees</p>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>

  <div class="form-group">
    <label>Password</label>
    <div style="position: relative;">
    <input type="password" id="createPassword" placeholder="Create a password" />
    <button type="button" id="toggleCreatePassword"
    style="position: absolute; right: 0px; top: 0%; width: 50px; transform: translateY(-50%);">
    👁️
    </button>
  </div>

  <div class="form-group">
    <label>Confirm Password</label>
    <div style="position: relative;">
    <input type="password" id="confirmPassword" placeholder="Confirm your password" />
    <button type="button" id="toggleConfirmPassword"
    style="position: absolute; right: 0px; top: 0%; width: 50px; transform: translateY(-50%);">
    👁️
    </button>
  </div>

<button onclick="signup()">Sign Up</button>

  <div class="footer">
    Already have an account? <a href="sign-in.html">Sign in</a>
  </div>
</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
 const firebaseConfig = {
  apiKey: "AIzaSyAdQ7By9HrCbNhy2pT9cEVVcD-YCdHEuSs",
  authDomain: "deegees-a23ec.firebaseapp.com",
  projectId: "deegees-a23ec",
  storageBucket: "deegees-a23ec.firebasestorage.app",
  messagingSenderId: "8167578850",
  appId: "1:8167578850:web:a5d3dd989aec5bd83d92bb"

};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>
  <script>
const createPasswordInput = document.getElementById("createPassword");
const createToggleBtn = document.getElementById("toggleCreatePassword");

createToggleBtn.addEventListener("click", function () {
  if (createPasswordInput.type === "password") {
    createPasswordInput.type = "text";
    this.textContent = "🙈";
  } else {
    createPasswordInput.type = "password";
    this.textContent = "👁️";
  }
});

const confirmPasswordInput = document.getElementById("confirmPassword");
const confirmToggleBtn = document.getElementById("toggleConfirmPassword");

confirmToggleBtn.addEventListener("click", function () {
  if (confirmPasswordInput.type === "password") {
    confirmPasswordInput.type = "text";
    this.textContent = "🙈";
  } else {
    confirmPasswordInput.type = "password";
    this.textContent = "👁️";
  }
});
   
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  if (!email || !password || !confirmPassword) {
    alert("Please fill in all fields");
    return;
  }

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  auth.createUserWithEmaconfirmPasswordd(email, password)
    .then(() => {
      alert("Account created!");
      window.location.href = "pattern-preview.html";
    })
    .catch(error => {
      alert(error.message);
    });
}
  </script>

 
</body>
  </html>
